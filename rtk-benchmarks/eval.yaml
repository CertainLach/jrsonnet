name: "Eval"
id: "eval"
description: "Comparing rtk with tk for environment evaluation."

fixtures:
  static_envs: 1
  inline_files: 1
  envs_per_inline_file: 10
  resources_per_env: 20

tests:
  - name: "Single Static Environment"
    description: "Evaluating a single static environment with {resources_per_env} resources (3 Kubernetes objects each)."
    command: "eval {single_static_dir}"

  - name: "Inline Environment File"
    description: "Evaluating an inline environment file containing {envs_per_inline_file} environments."
    command: "eval {single_inline_file}"

  - name: "Eval Expression - Deeply Nested Path"
    description: "Evaluating a single expression accessing a deeply nested path (6 levels) through a bracket-notation key with dashes."
    command: "eval {single_static_dir} -e 'nested[\"test-with-dash\"].deeply.nested.path.to.value'"
