apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: default
  annotations:
    # Last-applied config shows both app and sidecar were originally applied
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"apps/v1","kind":"Deployment","metadata":{"name":"web-app","namespace":"default"},"spec":{"replicas":1,"selector":{"matchLabels":{"app":"web"}},"template":{"metadata":{"labels":{"app":"web"}},"spec":{"containers":[{"name":"app","image":"nginx:1.0","ports":[{"containerPort":80}]},{"name":"sidecar","image":"busybox:1.0","command":["sh","-c","sleep infinity"]}]}}}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: app
          image: nginx:1.0
          ports:
            - containerPort: 80
        - name: sidecar
          image: busybox:1.0
          command:
            - sh
            - "-c"
            - sleep infinity
