apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deploy
  namespace: default
  # Note: NO kubectl.kubernetes.io/last-applied-configuration annotation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
        - name: app
          image: nginx:1.24
        - name: sidecar
          image: fluent-bit:2.0
