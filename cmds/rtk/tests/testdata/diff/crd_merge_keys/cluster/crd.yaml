# CustomResourceDefinition with merge key annotations in openAPIV3Schema
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databaseclusters.example.com
spec:
  group: example.com
  names:
    kind: DatabaseCluster
    plural: databaseclusters
    singular: databasecluster
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                instances:
                  type: array
                  x-kubernetes-list-map-keys:
                    - name
                  x-kubernetes-list-type: map
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      replicas:
                        type: integer
                      storage:
                        type: string
